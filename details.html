<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <div id="details" class="row align-items-center justify-content-center">
        <h2>Loading product...</h2>
    </div>
</div>

<script>
// Get product ID from URL
const params = new URLSearchParams(window.location.search); 
const id = params.get("id");

// Fetch and display single product
async function loadDetails() {
    let product = await fetch(`https://fakestoreapi.com/products/${id}`).then(res => res.json());
    
    // 
    document.getElementById("details").innerHTML = `
        <div class="col-md-6 text-center">
            <img src="${product.image}" class="img-fluid" alt="${product.title}">
        </div>
        <div class="col-md-6">
            <h3>${product.title}</h3>
            <h4 class="text-success">$${product.price}</h4>
            <p>${product.description}</p>
            <a href="product.html" class="btn btn-secondary mt-3">⬅ Back to Products</a>
        </div>
    `;
}

loadDetails();
</script>

</body>
</html>
