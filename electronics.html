<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap CSS CDN link -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .card {
            height: 60vh;

        }

        .card img {
            height: 50%;
        }

        #b {
            position: fixed;
            bottom: 20px;
            right: 20px;
            /* background-color: #343a40;
    color: white; */
            font-size: 28px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            z-index: 9999;
            opacity: 0.8;
            transition: 0.3s;
        }
    </style>

</head>

<body>
    <!-- body to display -->

    <nav class="navbar navbar-expand-lg bg-danger-subtle">
        <div class="container-fluid">
            <a class="navbar-brand" href="./index.html">SciPy</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="text-center">Electronics</h1>
        <div class="row electronics-products" style="row-gap: 2rem;">
            <!-- Electronics Cards Load Here -->
        </div>
        <button id="b">Home</button>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        const productsContainer = document.querySelector(".electronics-products");

        productsContainer.innerHTML = "<h2>Loading Electronics...</h2>";

        (async () => {

            let api_data = await (await fetch("https://fakestoreapi.com/products")).json();
            console.log(api_data);


            //  Find electronics using loop
            let electronics = []; // empty array to store only electronics products

            // Loop through all API data
            for (const item of api_data) {

                if (item.category === "electronics") {
                    electronics.push(item);   // manually store electronics products
                }

            }
            // displaying electronics
            let output = "";

            for (const product of electronics) {
                output += `
    <div class="col-3">
        <div class="card">
            <img src="${product.image}" class="card-img-top">
            <div class="card-body">
                <p class="card-title">${product.title}</p>
                <a href="#" class="btn btn-primary">Add to cart</a>
            </div>
        </div>
    </div>
    `;
            }
            productsContainer.innerHTML = output;

        })();


    </script>
</body>

</html>
